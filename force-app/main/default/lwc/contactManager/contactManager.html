<template>
    <lightning-card title="CRM Contact Manager" icon-name="standard:contact">

        <!-- Form -->
        <div class="slds-p-around_medium">
            <lightning-input label="Name" value={name} onchange={handleName}></lightning-input>
            <lightning-input label="Email" value={email} onchange={handleEmail}></lightning-input>
            <lightning-input label="Phone" value={phone} onchange={handlePhone}></lightning-input>

            <lightning-button variant="brand" label="Add Contact" onclick={addContact}></lightning-button>
        </div>

        <!-- Search -->
        <div class="slds-p-horizontal_medium">
            <lightning-input type="search" label="Search" onchange={handleSearch}></lightning-input>
        </div>

        <!-- Table -->
        <lightning-datatable
            key-field="Id"
            data={filteredContacts}
            columns={columns}
            onsave={handleSave}
            draft-values={draftValues}
        >
        </lightning-datatable>

    </lightning-card>
</template>
